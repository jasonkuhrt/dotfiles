# ╔════════════════════════════════════════════════════════════════════════════╗
# ║  Declarative Keymap - Single Source of Truth                               ║
# ║  Tools: zed, nvim, vscode, cmux, fish, cc (claude code)                    ║
# ╚════════════════════════════════════════════════════════════════════════════╝
#
# Post-vscode-neovim migration architecture:
# VS Code's vim layer is provided by vscode-neovim, which executes the nvim
# init.lua. Therefore the `nvim` column governs both terminal nvim AND VS Code
# vim-mode behavior. The `vscode` column is only populated where a chord
# dispatches a VS Code-specific command (via vscode.action()) that does NOT
# apply in terminal nvim — typically PR review, GitHub-link, or chrome ops.
#
# Navigation strategy (hjkl + modifier philosophy): see hjkl-navigation.md
#
# Prefix architecture (single-key, sans-leader):
#   g    LSP/goto              (vim convention; LazyVim defaults)
#   q    git                   (replaces vim's macro recording — unused)
#   m    match/surround        (Helix-style; replaces vim's mark-set on most letters)
#   t    toggle/panel          (replaces <leader>p* and <leader>t*)
#   ,    config menu           (Zed/VSCodeVim convention)
#
# Legend:
#   C-x    = ctrl+x
#   M-x    = alt/meta+x
#   S-x    = shift+x
#   D-x    = cmd+x (macOS)
#   <spc>  = space (leader)
#   <cr>   = enter
#   "-"    = no equivalent in this tool
#   "?"    = TBD / needs mapping

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MODE SWITCHING
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

mode:
  normal_from_insert:
    desc: Exit insert mode
    zed: "k j"
    nvim: "kj"
    fish: "kj"
    cc: "kj"

  normal_from_visual:
    desc: Exit visual mode
    zed: "q"
    nvim: "<esc>"
    cc: "<esc>"

  exit_terminal:
    desc: Exit terminal insert mode
    nvim: "kj"        # <C-\><C-n>

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PANE/WINDOW NAVIGATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

pane:
  focus_up:
    desc: Focus pane above
    zed: "C-k"
    nvim: "C-k"           # cmux-nav (crosses nvim↔cmux)
    cmux: "C-0 k"

  focus_down:
    desc: Focus pane below
    zed: "C-j"
    nvim: "C-j"
    cmux: "C-0 j"

  focus_left:
    desc: Focus pane left
    zed: "C-h"
    nvim: "C-h"
    cmux: "C-0 h"

  focus_right:
    desc: Focus pane right
    zed: "C-l"
    nvim: "C-l"
    cmux: "C-0 l"

  resize_up:
    desc: Resize pane up
    nvim: "M-k"           # cmux-nav
    cmux: "C-0 r k"

  resize_down:
    desc: Resize pane down
    nvim: "M-j"
    cmux: "C-0 r j"

  resize_left:
    desc: Resize pane left
    nvim: "M-h"
    cmux: "C-0 r h"

  resize_right:
    desc: Resize pane right
    nvim: "M-l"
    cmux: "C-0 r l"

  create_up:
    desc: Create split above
    zed: "C-D-k"          # pane::SplitUp
    cmux: "C-0 s k"

  create_down:
    desc: Create split below
    zed: "C-D-j"
    cmux: "C-0 s j"

  create_left:
    desc: Create split left
    zed: "C-D-h"
    cmux: "C-0 s h"

  create_right:
    desc: Create split right
    zed: "C-D-l"
    cmux: "C-0 s l"

  zoom:
    desc: Zoom current pane
    zed: "<spc> z"
    cmux: "C-0 z"

  close:
    desc: Close pane (host confirmation required)
    cmux: "C-0 x"

cmux_mode:
  toggle:
    desc: Enter or exit sticky cmux drive mode
    cmux: "C-0"

  exit:
    desc: Exit sticky cmux drive mode
    cmux: "<esc> / <cr> / C-0"

  workspace_prev:
    desc: Select previous workspace in sidebar order
    cmux: "C-0 w k"

  workspace_next:
    desc: Select next workspace in sidebar order
    cmux: "C-0 w j"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DOCKS (CHROME — Zed-only)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

dock:
  toggle_left:
    desc: Toggle left dock/sidebar
    zed: "D-h"

  toggle_right:
    desc: Toggle right dock/sidebar
    zed: "D-l"

  toggle_bottom:
    desc: Toggle bottom dock/panel
    zed: "D-j"

  close_all_docks:
    desc: Close all docks
    zed: "<spc> p P"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PALETTES & FINDERS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

palette:
  commands:
    desc: Command palette
    zed: ":"
    nvim: ":"             # cmdux picker in terminal; showCommands in VS Code via vscode-neovim
    cc: "/"

  ex_command:
    desc: Vim ex command
    zed: ";"
    nvim: ";"             # remapped from :

  files:
    desc: File finder / quick open
    zed: "<spc> k"
    nvim: "<spc> k"       # LazyVim.pick("files") — also <spc> <spc>

  symbols_buffer:
    desc: Symbols in current buffer
    zed: "<spc> l"
    nvim: "<spc> ss"      # LazyVim snacks symbols

  symbols_project:
    desc: Symbols across project
    zed: "<spc> L"
    nvim: "<spc> sS"      # LazyVim snacks symbols (workspace)

  tasks:
    desc: Task runner
    zed: "<spc> j"
    nvim: "-"             # no built-in equivalent

  recent_projects:
    desc: Open recent project
    zed: "<spc> o"
    nvim: "<spc> fp"      # LazyVim snacks projects

menu:
  next:
    desc: Select next item in menu/picker
    zed: "C-j"
    nvim: "C-j"           # blink.cmp, snacks picker

  prev:
    desc: Select previous item in menu/picker
    zed: "C-k"
    nvim: "C-k"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MOTION (VIM-STYLE)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

motion:
  scroll_up:
    desc: Scroll up (half page, centered)
    zed: "K"               # +zz via SendKeystrokes
    nvim: "K"              # remapped to <C-u>zz

  scroll_down:
    desc: Scroll down (half page, centered)
    zed: "J"               # +zz via SendKeystrokes
    nvim: "J"              # remapped to <C-d>zz

  buffer_prev:
    desc: Previous buffer
    zed: "[ b"             # if Zed supports; else gap
    nvim: "[b"             # LazyVim default

  buffer_next:
    desc: Next buffer
    zed: "] b"
    nvim: "]b"             # LazyVim default

  doc_start:
    desc: Go to start of document
    zed: "g g"
    nvim: "gg"

  doc_end:
    desc: Go to end of document (centered)
    zed: "G"               # +zz via SendKeystrokes
    nvim: "G"              # remapped to Gzz

  line_start:
    desc: Go to start of line (first non-blank)
    zed: "H"
    nvim: "H"              # remapped from <C-u>; remaps to ^

  line_end:
    desc: Go to end of line
    zed: "L"
    nvim: "L"              # remapped from <C-d>; remaps to $

  sneak_forward:
    desc: Sneak/leap forward (single-char jump)
    zed: "f"
    nvim: "s"              # flash.nvim default; user uses f/F via custom

  sneak_backward:
    desc: Sneak/leap backward
    zed: "F"
    nvim: "S"

  history_back:
    desc: Go back in jump history
    zed: "["
    nvim: "C-o"

  history_forward:
    desc: Go forward in jump history
    zed: "]"
    nvim: "C-i"

  word_forward:
    desc: Word forward (vim default — preserved as primitive)
    zed: "w"
    nvim: "w"

  word_back:
    desc: Word back
    zed: "b"
    nvim: "b"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CODE NAVIGATION (LSP — g-prefix, vim convention)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

code:
  goto_definition:
    desc: Go to definition
    zed: "g d"
    nvim: "gd"             # LazyVim/lspconfig default

  goto_definition_split:
    desc: Go to definition (in split)
    zed: "g D"             # if Zed supports split; else gap
    nvim: "gD"             # LazyVim — actually goto_declaration; split TBD

  goto_declaration:
    desc: Go to declaration
    nvim: "gD"             # LazyVim default

  goto_type_definition:
    desc: Go to type definition
    zed: "g y"             # if Zed supports; else gap
    nvim: "gy"             # LazyVim default

  goto_implementation:
    desc: Go to implementation
    nvim: "gI"             # LazyVim default

  find_references:
    desc: Find all references
    zed: "g r"
    nvim: "gr"             # LazyVim default

  hover:
    desc: Hover docs
    zed: "g h"             # if Zed supports; else fallback to <spc> k
    nvim: "gh"             # custom (displaced from K which is half-page up)

  diagnostic_next:
    desc: Go to next diagnostic
    zed: "] d"
    nvim: "]d"             # LazyVim default

  diagnostic_prev:
    desc: Go to previous diagnostic
    zed: "[ d"
    nvim: "[d"             # LazyVim default

  signature_help:
    desc: LSP signature help
    nvim: "gK"             # LazyVim default

  code_actions:
    desc: Show code actions
    zed: "<spc> ."
    nvim: "<spc> ."        # LazyVim's <spc>ca alias

  rename:
    desc: Rename symbol
    zed: "r"
    nvim: "r"              # vim.lsp.buf.rename; replaces vim's r<char> primitive
    cc: "-"                # no LSP context

  rename_alt:
    desc: Rename symbol (LazyVim canonical chord; alias for r)
    nvim: "<spc> cr"

  join_lines:
    desc: Join lines (vim's J primitive, displaced from J which is now half-page)
    nvim: "gJ"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MATCH / SURROUND (m-prefix — Helix-style)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

match:
  match_bracket:
    desc: Go to matching bracket (replaces ergonomic use of %)
    zed: "m m"
    nvim: "mm"             # vim's % under the hood
    # vim's % remains as default escape hatch

  text_object_inside:
    desc: Select inside text object (e.g., mi( — uses vim built-in i textobject)
    zed: "m i <obj>"
    nvim: "mi <obj>"       # backed by vim's i<obj>; obj ∈ ( { [ " ' p w s f c a etc.

  text_object_around:
    desc: Select around text object (e.g., ma{ — uses vim built-in a textobject)
    zed: "m a <obj>"
    nvim: "ma <obj>"

surround:
  add:
    desc: Add surrounding pair around selection
    zed: "m s <pair>"
    nvim: "ms <pair>"      # mini.surround configured for m-prefix

  delete:
    desc: Delete surrounding pair
    zed: "m d <pair>"
    nvim: "md <pair>"

  replace:
    desc: Replace surrounding pair
    zed: "m r <old> <new>"
    nvim: "mr <old> <new>"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# EDITING
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

edit:
  undo:
    desc: Undo
    zed: "u"
    nvim: "u"

  redo:
    desc: Redo
    zed: "U"
    nvim: "U"             # remapped from C-r

  duplicate_up:
    desc: Duplicate line/selection up (visual mode)
    zed: "D-k"

  duplicate_down:
    desc: Duplicate line/selection down (visual mode)
    zed: "D-j"

  visual_line:
    desc: Enter visual-line mode (select whole lines)
    zed: "V"               # reverted from SelectEnclosingSymbol — vim primitive preserved
    nvim: "V"              # default

  select_expand:
    desc: Expand selection to larger syntax node (visual mode)
    zed: "v"               # also }
    nvim: "<C-space>"      # treesitter incremental selection; LazyVim default

  select_shrink:
    desc: Shrink selection to smaller syntax node (visual mode)
    zed: "{"
    nvim: "<bs>"           # treesitter incremental selection

  select_enclosing_function:
    desc: Select enclosing function body (treesitter text-object)
    zed: "v i f"           # via treesitter LSP / Zed text objects
    nvim: "vif"            # treesitter-textobjects (already installed)

  select_enclosing_class:
    desc: Select enclosing class
    nvim: "vic"

  fold_toggle:
    desc: Toggle fold
    zed: "z o"
    nvim: "za"

  fold_close:
    desc: Close fold
    zed: "z c"
    nvim: "zc"

  fold_all:
    desc: Fold all
    zed: "z M"
    nvim: "zM"

  unfold_all:
    desc: Unfold all
    zed: "z R"
    nvim: "zR"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SEARCH
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

search:
  buffer:
    desc: Search in buffer (vim default)
    zed: "/"
    nvim: "/"

  buffer_replace:
    desc: Search & replace in buffer
    zed: "?"               # buffer search/replace
    nvim: ":%s/"           # vim ex substitution

  project:
    desc: Search across project (find-in-files)
    zed: "D-?"             # <spc> s in VSCodeVim era
    nvim: "<spc> sg"       # LazyVim grep

  next:
    desc: Go to next match (centered)
    zed: "n"               # +zz via SendKeystrokes
    nvim: "n"              # remapped to nzz

  prev:
    desc: Go to previous match (centered)
    zed: "N"               # +zz via SendKeystrokes
    nvim: "N"              # remapped to Nzz

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GIT (q-prefix — replaces vim's macro recording on q)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

git:
  hunk_next:
    desc: Go to next hunk
    zed: "q j"
    nvim: "qj"             # gitsigns next_hunk

  hunk_prev:
    desc: Go to previous hunk
    zed: "q k"
    nvim: "qk"             # gitsigns prev_hunk

  branch:
    desc: Switch / pick branch
    zed: "q b"
    nvim: "qb"             # via lazygit (snacks)

  panel:
    desc: Toggle git panel / lazygit float
    zed: "q w"
    nvim: "qw"             # Snacks.lazygit() in nvim

  diff:
    desc: Show diff (panel or file)
    zed: "q d"
    nvim: "qd"             # diffview.nvim

  hunk_toggle:
    desc: Toggle inline hunk visibility
    zed: "q o"
    nvim: "qo"             # gitsigns toggle_signs / preview_hunk_inline

  hunk_expand_all:
    desc: Expand all inline hunks
    zed: "q O"
    nvim: "qO"

  stage_toggle:
    desc: Toggle staged (range)
    zed: "q a"
    nvim: "qa"             # gitsigns stage_hunk

  stage_all:
    desc: Stage all
    zed: "q A"
    nvim: "qA"             # via lazygit

  restore:
    desc: Restore range (revert hunk)
    zed: "q u"
    nvim: "qu"             # gitsigns reset_hunk

  restore_file:
    desc: Restore file
    zed: "q U"
    nvim: "qU"             # via lazygit

  commit:
    desc: Commit
    zed: "q c"
    nvim: "qc"             # via lazygit

  push:
    desc: Push
    zed: "q p"
    nvim: "qp"             # via lazygit

  push_force:
    desc: Force push
    zed: "q P"
    nvim: "qP"             # via lazygit

  blame:
    desc: Toggle blame for current line
    zed: "q B"             # if Zed supports; else gap
    nvim: "qB"             # gitsigns toggle_current_line_blame

  log_graph:
    desc: Git history / graph view
    zed: "-"               # no Zed equivalent (gap)
    nvim: "ql"             # diffview.nvim history

  pr_open:
    desc: Open / review pull request
    zed: "-"
    nvim: "qr"             # octo.nvim
    vscode: "q r"          # extension.openPrGitProvider

  pr_diff_next:
    desc: Next PR diff
    zed: "-"
    nvim: "qn"             # octo.nvim
    vscode: "q n"          # pr.goToNextDiffInPr

  pr_diff_prev:
    desc: Prev PR diff
    zed: "-"
    nvim: "qN"             # octo.nvim
    vscode: "q N"          # pr.goToPreviousDiffInPr

  copy_github_link:
    desc: Copy GitHub link for current line/selection
    zed: "-"
    nvim: "qy"             # gitlinker.nvim
    vscode: "q y"          # extension.copyGitHubLinkToClipboard

  open_in_github:
    desc: Open current line/selection in GitHub web
    zed: "-"
    nvim: "qY"             # gitlinker.nvim browse
    vscode: "q Y"          # extension.openInGitHub

  # qf fetch, qs/qS stash/pop reachable via lazygit TUI keys (no dedicated chord)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TOGGLE / PANELS (t-prefix — unified, replaces <leader>p* and <leader>t*)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

toggle:
  explorer:
    desc: Toggle file explorer / project panel
    zed: "t e"
    nvim: "te"             # Snacks.explorer()

  git_panel:
    desc: Toggle git panel / lazygit float
    zed: "t g"
    nvim: "tg"             # Snacks.lazygit() (alias to qw)

  terminal:
    desc: Toggle terminal panel
    zed: "t t"
    nvim: "tt"             # Snacks.terminal()

  outline:
    desc: Toggle outline panel
    zed: "t o"
    nvim: "to"             # aerial.nvim

  diagnostics:
    desc: Toggle diagnostics panel
    zed: "t d"
    nvim: "td"             # trouble.nvim

  inlay_hints:
    desc: Toggle inlay hints
    zed: "t h"
    nvim: "th"             # vim.lsp.inlay_hint

  code_lens:
    desc: Toggle code lens
    zed: "t c"
    nvim: "tc"

  word_wrap:
    desc: Toggle word wrap / soft wrap
    zed: "t w"
    nvim: "tw"             # set wrap!

  blame_inline:
    desc: Toggle inline blame
    zed: "t b"
    nvim: "tb"             # gitsigns toggle_current_line_blame (alias to qB)

  close_panels:
    desc: Close all panels / docks
    zed: "t P"
    nvim: "tP"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CONFIGURATION (,-prefix)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

config:
  settings:
    desc: Open settings
    zed: ", ,"
    nvim: ",,"             # :e $MYVIMRC or similar

  keymap:
    desc: Open keymap
    zed: ", k"
    nvim: ",k"             # :e ~/.config/nvim/lua/config/keymaps.lua

  keymap_default:
    desc: Open default keymap
    zed: ", K"

  snippets:
    desc: Configure snippets
    zed: ", s"

  tasks:
    desc: Open tasks config
    zed: ", t"

  toggle_inline_diagnostics:
    desc: Toggle inline diagnostics
    zed: ", e"

  toggle_inline_values:
    desc: Toggle inline values
    zed: ", v"

  toggle_warnings:
    desc: Toggle warnings visibility
    zed: ", w"

  toggle_soft_wrap:
    desc: Toggle soft wrap
    zed: ", <spc>"

  toggle_gitignore:
    desc: Toggle gitignore visibility
    zed: ", g"

  reload:
    desc: Reload workspace
    zed: ", R"

  restart_lsp:
    desc: Restart language server
    zed: ", r"
    nvim: ",r"             # :LspRestart

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AI ASSIST
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

ai:
  toggle_panel:
    desc: Toggle AI panel
    zed: "D-L"

  accept_prediction:
    desc: Accept edit prediction
    zed: "S-<cr>"

  inline_switch:
    desc: Inline assist - convert to switch
    zed: "<spc> r s"

  inline_ternary:
    desc: Inline assist - convert to ternary
    zed: "<spc> r t"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PROJECT PANEL (chrome — Zed; nvim equivalent in snacks.explorer)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

project_panel:
  nav_prev_dir:
    desc: Select previous directory
    zed: "C-k"

  nav_next_dir:
    desc: Select next directory
    zed: "C-j"

  first:
    desc: Select first item
    zed: "K"

  last:
    desc: Select last item
    zed: "J"

  collapse_all:
    desc: Collapse all entries
    zed: "H"

  new_file:
    desc: Create new file
    zed: "n"

  new_dir:
    desc: Create new directory
    zed: "N"

  rename:
    desc: Rename item
    zed: "r"

  delete:
    desc: Delete item (trash)
    zed: "d"

  copy:
    desc: Copy item
    zed: "c"

  paste:
    desc: Paste item
    zed: "p"

  search_in_dir:
    desc: Search in directory
    zed: "/"

  open_system:
    desc: Open with system app
    zed: "D-<cr>"

  reveal_finder:
    desc: Reveal in Finder
    zed: "S-<cr>"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GIT PANEL (chrome — Zed)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

git_panel:
  first:
    desc: Select first item
    zed: "K"

  last:
    desc: Select last item
    zed: "J"

  stage:
    desc: Stage file
    zed: "l"

  unstage:
    desc: Unstage file
    zed: "h"

  toggle_staged:
    desc: Toggle staged
    zed: "a"

  open_file:
    desc: Open file
    zed: "o"

  open_diff:
    desc: Open in diff panel
    zed: "O"

  restore:
    desc: Restore file (with prompt)
    zed: "d"

  restore_force:
    desc: Restore file (no prompt)
    zed: "D"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TERMINAL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

terminal:
  new:
    desc: New terminal
    zed: "D-t"

  multiline_input:
    desc: Insert newline in input
    zed: "S-<cr>"
    cmux: "S-<cr>"
    cc: "S-<cr>"

  clear_screen:
    desc: Clear terminal scrollback
    cmux: "C-'"           # Ghostty clear_screen (read by cmux)

  exit_to_editor:
    desc: Return focus to editor
    zed: "C-'"

  shell_command:
    desc: External command from nvim
    nvim: "!"             # remapped from :!
